<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description" content="A lightweight TypeScript, SCSS, and HTML template for building small Material Design web tools." />
		<meta name="theme-color" content="#6750A4" />
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Material Web Tools Template" />
		<meta property="og:description" content="A lightweight TypeScript, SCSS, and HTML template for building small Material Design web tools." />

		<link rel="manifest" href="/material-web-tools-template/manifest.webmanifest" />
		<!-- Keep this CDN import map synchronized with package.json so the app can
			still load Material Web custom elements when Vite leaves these imports external. -->
		<script type="importmap">
			{
				"imports": {
					"@material/web/": "https://esm.sh/@material/web@2.3.0/"
				}
			}
		</script>
		<title>Material Web Tools Template</title>
	</head>
	<body>
		<div id="app"></div>
		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
